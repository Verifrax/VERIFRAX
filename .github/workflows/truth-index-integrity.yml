name: Truth Index Integrity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  truth-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify integrity manifests
        run: |
          node -e '

          const fs = require("fs");

          const files = [
            "release-integrity/reference-verifier-hashes.json",
            "release-integrity/release-sha256-manifest.json",
            "release-integrity/genesis-lineage.json",
            "release-integrity/freeze-surfaces.json"
          ];

          for (const f of files) {
            if (!fs.existsSync(f)) {
              console.error("Missing required truth index artifact:", f);
              process.exit(1);
            }
          }

          console.log("Truth index artifacts verified present.");

          '
